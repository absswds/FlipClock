name: Build Release Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.7

      - name: Install Web dependencies
        working-directory: web
        run: npm ci

      - name: Test Web
        working-directory: web
        run: npm run test

      - name: Build Web
        working-directory: web
        run: npm run build

      - name: Test Android
        run: gradle :app:testDebugUnitTest --no-daemon

      - name: Build Android debug package
        run: gradle :app:assembleDebug --no-daemon

      - name: Build Desktop Launcher (Windows exe)
        run: |
          cp -r web/dist desktop/dist
          touch desktop/dist/fonts/.gitkeep
          cd desktop
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w -H=windowsgui" -o flipclock-desktop.exe .

      - name: Package release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cd web/dist
          zip -r "../../release-assets/flipclock-web-${GITHUB_REF_NAME}.zip" .
          cd ../..
          cp app/build/outputs/apk/debug/app-debug.apk "release-assets/flipclock-android-${GITHUB_REF_NAME}.apk"
          cp desktop/flipclock-desktop.exe "release-assets/flipclock-desktop-${GITHUB_REF_NAME}.exe"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flipclock-${{ github.ref_name }}-packages
          path: release-assets/*

      - name: Upload GitHub Release assets
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            release-assets/flipclock-web-${{ github.ref_name }}.zip
            release-assets/flipclock-android-${{ github.ref_name }}.apk
            release-assets/flipclock-desktop-${{ github.ref_name }}.exe
